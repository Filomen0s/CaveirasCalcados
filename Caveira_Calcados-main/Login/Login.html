<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caveira's Login</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Irish+Grover&display=swap" rel="stylesheet">


    <link rel="stylesheet" href="Login.css">
    <script src="/caveira.js"></script>
</head>
<body>
    
    <section class="container">
        <img class="logo" src="../Imagens/LogoPromoCaveira.png">
      <br>


    <!-- Login -->
   
    <div class = "nome">
        <label for="NomeCadastro">Nome:</label>
        <input type="text" name="NomeCadastro" id="nameCadastro">
        </div>
        <div class="email">
        <label for="emailCadastro">E-mail:</label>
        <input type="email" name="emailCadastro" id="emailCadastro">
        </div>
        <div class="Senha">
            <label for="senhaCadastro">Senha:</label>
            <input type="password"name="senhaCadastro">    
        </div><br><br>

        <div class="ParteBaixa">
        <button class="entrar" onclick="Entrar()">Entrar</button><br>
        <h3>Não possui uma conta?</h4>
        <button class="cadastrar" onclick="Cadastrar()">Criar uma conta</button><br>
    </div>
    </div>
    </section>  
</body>
</html>
