<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Irish+Grover&display=swap" rel="stylesheet">
    
    <script src="GenrenciarArmazenamento.js"></script>
    <link rel="stylesheet" href="GenrenciarArmazenamento.css">
    <title>Caveira's Calçados</title>
</head>
<body>
    <h1>Cadastro de Produto</h1>

    <div class="areaDosImput">
        <input class="nomeInserir" type="text" id="nome" placeholder="Nome do Produto" required><br>
        <input class="precoInserir" type="number" id="preco" placeholder="Preço do Produto" required><br>
        <input class="descricaoInserir" type="text" id="descricao" placeholder="Descrição do Produto" required><br>
        <input class="imagemInserir" type="text" id="urlImage" placeholder="URL da imagem do Produto" required><br>
        <button class="cadastrarProduto" type="button" onclick="cadastrarProduto()">Cadastrar Produto</button>
    </div>

    <div class="listaProdutos" id="produtos">
        <h2>Produtos Cadastrados</h2>
        <button class="limparLista" onclick="limparProdutos()">Limpar lista</button>
        <ul id="listaProdutos"></ul>
    </div>
</body>
</html>
